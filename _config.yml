title: "HomeOne"
description: "Memory"
url: "https://jeyihlin.github.io"   # exact production URL
baseurl: ""                          # User site MUST be empty string
theme: minima                        # keep simple until build is green
author: Jeff Lin

# (optional but helpful)
timezone: Asia/Taipei
permalink: /:categories/:year/:month/:day/:title/
markdown: kramdown

# Only enable plugins AFTER we get a clean build.
# plugins:
#   - jekyll-feed
#   - jekyll-sitemap

# Keep junk out of Git
exclude:
  - node_modules
  - _site
  - .jekyll-cache
  - .sass-cache